name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check src/ tests/

      - name: Run unit tests
        env:
          # Unit tests don't need a real DB — they use mocks
          SECRET_KEY: ci-test-secret-key-32-chars-long!!
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: "30"
          DATABASE_URL: postgresql+asyncpg://ci:ci@localhost:5432/ci_db
          REDIS_URL: redis://localhost:6379/0
          INFLUX_URL: http://localhost:8086
          INFLUX_TOKEN: ci-token
          INFLUX_ORG: ci
          INFLUX_BUCKET: ci
          ENVIRONMENT: test
          PROFILE: lite
        run: pytest tests/unit/ -v --tb=short

  frontend:
    name: Frontend (Node.js)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000
        run: npm run build
